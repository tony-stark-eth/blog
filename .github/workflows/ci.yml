name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Astro type check
        run: bunx astro check

      - name: TypeScript strict check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
