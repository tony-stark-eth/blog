name: Cross-Post

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/en/**'
  workflow_dispatch:
    inputs:
      post_slug:
        description: "Specific post slug to cross-post (leave empty for all new)"
        required: false

permissions:
  contents: write

jobs:
  cross-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cross-Post to Dev.to + Hashnode
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_PAT: ${{ secrets.HASHNODE_PAT }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: bun scripts/cross-post.ts ${{ github.event.inputs.post_slug || '' }}

      - name: Commit state update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cross-post-state.json
          git diff --staged --quiet || git commit -m "chore: update cross-post state"
          git pull --rebase
          git push
